name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/index.js
          node --check src/testmo-client.js
          node --check src/tools.js

      - name: Verify tools load
        run: |
          node -e "
            import('./src/tools.js').then(m => {
              if (!m.TOOLS.length) throw new Error('No tools registered');
              console.log('Tools registered:', m.TOOLS.length);
            })
          "
        env:
          TESTMO_URL: https://example.testmo.net
          TESTMO_TOKEN: fake

      - name: Check package contents
        run: npm pack --dry-run
